name: CI

on:
  push:
    branches: [main, alpha, nightly]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-check:
    name: Go Vet & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder dist dirs for go:embed
        run: |
          mkdir -p web/default/dist web/classic/dist
          echo '<!doctype html><html><head><title>ci</title></head><body>placeholder</body></html>' > web/default/dist/index.html
          echo '<!doctype html><html><head><title>ci</title></head><body>placeholder</body></html>' > web/classic/dist/index.html

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/default
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint || true
        continue-on-error: true

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  go-build:
    name: Full Build
    runs-on: ubuntu-latest
    needs: [go-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Set version
        id: version
        run: echo "VERSION=$(cat VERSION 2>/dev/null || echo 'ci-build')" >> "$GITHUB_OUTPUT"

      - name: Build default frontend
        working-directory: web/default
        env:
          DISABLE_ESLINT_PLUGIN: 'true'
          VITE_REACT_APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          bun install
          bun run build

      - name: Build classic frontend
        working-directory: web/classic
        env:
          VITE_REACT_APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          bun install
          bun run build

      - name: Go build
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${{ steps.version.outputs.VERSION }}'" -o /dev/null
