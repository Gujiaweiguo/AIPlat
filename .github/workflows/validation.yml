name: Validation

on:
  workflow_dispatch:

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-race-test:
    name: Go Race Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'
          cache: true

      - name: Run race tests
        run: go test -race ./...

  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'
          cache: true

      - name: Generate coverage report
        run: go test -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

  frontend-full-check:
    name: Frontend Full Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/default
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bun run format:check

      - name: Copyright check
        run: bun run copyright:check

      - name: Build
        run: bun run build

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (dry run)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
