# Local development database for separated frontend/backend workflow
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. Run PostgreSQL locally via Docker
#   3. Start backend locally: go run main.go
#   4. Start default frontend locally: cd web/default && bun install && bun run dev
#   5. Optional legacy frontend: cd web/classic && bun install && bun run dev
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  aiplat-postgresql:
    image: postgres:15-alpine
    container_name: aiplat-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_pg_data:

networks:
  dev-network:
    driver: bridge
