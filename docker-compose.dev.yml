# Local development environment for separated frontend/backend workflow
#
# This project shares a PostgreSQL instance with mysqlbot (sqlbot-postgresql-dev).
# The "new-api" database is already created in that container.
#
# Prerequisites:
#   - sqlbot-postgresql-dev container must be running (mysqlbot's PostgreSQL)
#   - The "new-api" database must exist in that PostgreSQL instance
#
# Quick Start:
#   1. Ensure sqlbot-postgresql-dev is running
#   2. Start backend locally:
#        SQL_DSN="postgresql://sqlbot_user:DevOnly@123456@localhost:15432/new-api" go run main.go
#   3. Start default frontend locally:
#        cd web/default && bun install && bun run dev
#   4. Optional legacy frontend:
#        cd web/classic && bun install && bun run dev
#
# Create the database (only needed once):
#   docker exec sqlbot-postgresql-dev psql -U sqlbot_user -d sqlbot -c 'CREATE DATABASE "new-api";'
#
# Reset setup state:
#   docker exec sqlbot-postgresql-dev psql -U sqlbot_user -d "new-api" \
#     -c 'DELETE FROM setups;' \
#     -c 'DELETE FROM users WHERE role = 100;' \
#     -c "DELETE FROM options WHERE key IN ('SelfUseModeEnabled', 'DemoSiteEnabled');"

# No services defined — database is provided by sqlbot-postgresql-dev (mysqlbot's PostgreSQL).
# This file is kept for documentation purposes and future dev infrastructure.
